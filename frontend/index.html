<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Boilerplate</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #121212; 
            color: #ffffff;
        }
        .card { 
            background: #1e1e1e; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            text-align: center; 
            border: 1px solid #333;
        }
        h1 { margin-top: 0; color: #bb86fc; }
        #data { 
            margin-top: 1.5rem; 
            padding: 1.5rem; 
            background: #2d2d2d; 
            border-radius: 8px; 
            font-family: monospace; 
            color: #03dac6;
            white-space: pre-wrap;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Сервер активен</h1>
        <div id="data">Загрузка данных...</div>
    </div>
    <script>
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('data').textContent = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('data').textContent = 'Ошибка соединения: ' + err;
            });
    </script>
</body>
</html>
