services:
  my-web-app:
    build: .
    depends_on:
      - rabbitmq

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - my-web-app

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  # --- НАШ НОВЫЙ МИКРОСЕРВИС ---
  inventory-service:
    build: 
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - rabbitmq